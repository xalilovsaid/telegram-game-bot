<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koinot Jangi 🚀 - Cyber Space Shooter</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #040209;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #0f0d25 0%, #030207 100%);
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #060515;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        /* PC/Desktop o'lchamlari uchun 16:9 formatga o'tish */
        @media (min-width: 800px) {
            #game-container {
                width: 960px;
                height: 540px;
                border-radius: 12px;
            }
        }
        canvas {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px #00f3ff;
            pointer-events: none;
            z-index: 5;
        }
        .ui-item {
            background: rgba(10, 8, 26, 0.6);
            padding: 5px 12px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 6px;
            backdrop-filter: blur(5px);
        }
        #health-bar-container {
            width: 100px;
            height: 12px;
            background-color: #111;
            border: 1px solid #ff007f;
            border-radius: 6px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }
        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #ff007f);
            transition: width 0.2s;
        }
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(6, 5, 18, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00f3ff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
        }
        p.desc {
            color: #8c8caf;
            margin-bottom: 15px;
            font-size: 13px;
            max-width: 480px;
            line-height: 1.4;
        }
        .btn {
            background: linear-gradient(90deg, #00f3ff, #ff007f);
            color: #fff;
            border: none;
            padding: 12px 36px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.7);
        }
        #controls-info {
            font-size: 12px;
            color: #555577;
            margin-top: 12px;
        }
        /* Mobile Touch Controls */
        #controls {
            position: absolute;
            bottom: 25px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
        }
        @media (min-width: 800px) {
            #controls {
                display: none; /* Kompyuterda yashirish */
            }
        }
        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 243, 255, 0.1);
            border: 2px solid #00f3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00f3ff;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .control-btn:active {
            background: rgba(0, 243, 255, 0.3);
            transform: scale(0.95);
        }
        #mini-leaderboard {
            width: 100%;
            max-width: 320px;
            margin: 15px auto;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div class="ui-item">SCORE: <span id="score-val">0</span></div>
            <div class="ui-item" style="display: flex; align-items: center;">
                <span>HP:</span>
                <div id="health-bar-container">
                    <div id="health-bar"></div>
                </div>
            </div>
        </div>

        <!-- Menu Screen -->
        <div id="menu-screen">
            <h1 id="menu-title">KOINOT JANGI 🚀</h1>
            <p class="desc" id="menu-desc">Kosmik kemani boshqarib, neon dushman kemalarini yo'q qiling! <br>Boshqarish: Strelkalar / WASD (Harakat), Space (Otish), Shift (Sekinlashish).</p>
            <div id="mini-leaderboard"></div>
            <button class="btn" id="start-btn" onclick="startGame()">Boshlash Play</button>
            <div id="controls-info">Kompyuterda klaviatura orqali o'ynash tavsiya etiladi 💻</div>
        </div>

        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- Touch Controls (Mobile) -->
        <div id="controls">
            <div class="control-btn" id="left-btn">◀</div>
            <div class="control-btn" id="shoot-btn">🔥</div>
            <div class="control-btn" id="right-btn">▶</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); }
        const tgUser = tg?.initDataUnsafe?.user || { id: 8833971710, first_name: "O'yinchi" };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menuScreen = document.getElementById('menu-screen');
        const menuTitle = document.getElementById('menu-title');
        const menuDesc = document.getElementById('menu-desc');
        const startBtn = document.getElementById('start-btn');
        const healthBar = document.getElementById('health-bar');
        const scoreVal = document.getElementById('score-val');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let gameActive = false;
        let score = 0;
        let player;
        let lasers = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        let enemySpawnInterval;
        let keys = {};
        let audioCtx;

        // Parallaks yulduzlar tizimi
        function initStars() {
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 1.5 + 0.5
                });
            }
        }

        // Web Audio API sintizatori
        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'laser') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } else if (type === 'explosion') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        // Leaderboard API integratsiyasi
        async function submitAndShowLeaderboard(gameName, finalScore) {
            try {
                await fetch('/api/submit_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: tgUser.id,
                        name: tgUser.first_name,
                        game: gameName,
                        score: finalScore
                    })
                });
            } catch(e) { console.error('Submit error:', e); }

            try {
                const resp = await fetch(`/api/leaderboard?game=${gameName}`);
                const players = await resp.json();
                renderMiniLeaderboard(players);
            } catch(e) { console.error('Leaderboard error:', e); }
        }

        function renderMiniLeaderboard(players) {
            const container = document.getElementById('mini-leaderboard');
            if (!container) return;
            const top10 = players.filter(p => p.score > 0).slice(0, 5);
            if (top10.length === 0) {
                container.innerHTML = '<p style="color:#8c8caf;font-size:12px;">Hozircha peshqadamlar yo\'q.</p>';
                return;
            }
            let html = '<div style="font-family:Orbitron,sans-serif;font-size:11px;color:#00f3ff;margin-bottom:6px;text-transform:uppercase;">🏆 TOP CO-OP REYTING</div>';
            html += '<div style="max-height:120px;overflow-y:auto;width:100%;">';
            top10.forEach((p, i) => {
                const medals = ['🥇','🥈','🥉'];
                const medal = i < 3 ? medals[i] : `#${i+1}`;
                const isMe = String(p.id) === String(tgUser.id);
                const bg = isMe ? 'rgba(255,215,0,0.15)' : 'rgba(255,255,255,0.05)';
                const border = isMe ? '1px solid #ffd700' : '1px solid rgba(255,255,255,0.08)';
                html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;margin:2px 0;border-radius:4px;background:${bg};border:${border};">`;
                html += `<span style="color:#ff007f;font-weight:bold;font-size:12px;">${medal}</span>`;
                html += `<span style="flex:1;color:#fff;font-size:12px;padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;">${p.name || 'Uchuvchi'}</span>`;
                html += `<span style="color:#00f3ff;font-weight:bold;font-size:12px;">${p.score.toLocaleString()}</span>`;
                html += '</div>';
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // Boshqaruv hodisalari
        let leftActive = false;
        let rightActive = false;

        document.getElementById('left-btn').addEventListener('touchstart', (e) => { e.preventDefault(); leftActive = true; });
        document.getElementById('left-btn').addEventListener('touchend', (e) => { e.preventDefault(); leftActive = false; });
        document.getElementById('right-btn').addEventListener('touchstart', (e) => { e.preventDefault(); rightActive = true; });
        document.getElementById('right-btn').addEventListener('touchend', (e) => { e.preventDefault(); rightActive = false; });
        document.getElementById('shoot-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if (player) player.shoot(); });

        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 80;
                this.width = 36;
                this.height = 28;
                this.speed = 6;
                this.health = 100;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00f3ff';
                ctx.fillStyle = '#00f3ff';
                
                // Neon uchburchak kosmik kema chizish
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.height/2);
                ctx.lineTo(this.x - this.width/2, this.y + this.height/2);
                ctx.lineTo(this.x + this.width/2, this.y + this.height/2);
                ctx.closePath();
                ctx.fill();
                
                // Dvigatel neon olovi
                ctx.fillStyle = '#ff007f';
                ctx.shadowColor = '#ff007f';
                ctx.beginPath();
                ctx.moveTo(this.x - 5, this.y + this.height/2);
                ctx.lineTo(this.x + 5, this.y + this.height/2);
                ctx.lineTo(this.x, this.y + this.height/2 + 8 + Math.random() * 6);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
            update() {
                // Shift sekinlashtirish/aniqlik rejimi
                const currentSpeed = keys['ShiftLeft'] || keys['ShiftRight'] ? this.speed / 2.5 : this.speed;

                // Klaviatura harakatlari (WASD yoki Strelkalar)
                if (keys['ArrowLeft'] || keys['KeyA'] || leftActive) {
                    this.x -= currentSpeed;
                }
                if (keys['ArrowRight'] || keys['KeyD'] || rightActive) {
                    this.x += currentSpeed;
                }
                if (keys['ArrowUp'] || keys['KeyW']) {
                    this.y -= currentSpeed;
                }
                if (keys['ArrowDown'] || keys['KeyS']) {
                    this.y += currentSpeed;
                }
                if (keys['Space']) {
                    if (lasers.length === 0 || lasers[lasers.length - 1].y < this.y - 120) {
                        this.shoot();
                    }
                }

                // Ekran chegaralari
                if (this.x < this.width/2) this.x = this.width/2;
                if (this.x > canvas.width - this.width/2) this.x = canvas.width - this.width/2;
                if (this.y < this.height/2 + 40) this.y = this.height/2 + 40;
                if (this.y > canvas.height - this.height/2) this.y = canvas.height - this.height/2;
            }
            shoot() {
                if (!gameActive) return;
                lasers.push(new Laser(this.x, this.y - this.height/2));
                playSound('laser');
            }
        }

        class Laser {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = 10;
                this.width = 4;
                this.height = 15;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff7f';
                ctx.fillStyle = '#00ff7f';
                ctx.fillRect(this.x - this.width/2, this.y, this.width, this.height);
                ctx.restore();
            }
            update() {
                this.y -= this.speed;
            }
        }

        class Enemy {
            constructor() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -30;
                this.speed = Math.random() * 2 + 1.5;
                this.radius = Math.random() * 8 + 12;
                this.color = ['#ff0055', '#ff00aa', '#ff007f'][Math.floor(Math.random()*3)];
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1.5;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
            playSound('explosion');
            
            // Mobil haptic feedback tebranishi
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
        }

        function spawnEnemy() {
            if (gameActive) {
                enemies.push(new Enemy());
            }
        }

        function startGame() {
            document.getElementById('mini-leaderboard').innerHTML = '';
            menuScreen.style.display = 'none';
            score = 0;
            scoreVal.innerText = score;
            healthBar.style.width = '100%';
            player = new Player();
            lasers = [];
            enemies = [];
            particles = [];
            initStars();
            gameActive = true;

            clearInterval(enemySpawnInterval);
            enemySpawnInterval = setInterval(spawnEnemy, 1000);
            
            updateGame();
        }

        function gameOver() {
            gameActive = false;
            playSound('gameover');
            clearInterval(enemySpawnInterval);
            
            menuScreen.style.display = 'flex';
            menuTitle.innerHTML = "🏁 KOSMIK HALOKAT";
            menuDesc.innerHTML = `Kemangiz vayron bo'ldi! 💥<br>Siz to'plagan ochko: <b>${score}</b>`;
            startBtn.innerText = "Qayta Boshlash";
            
            submitAndShowLeaderboard('space', score);
        }

        function updateGame() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Parallaks yulduzlar chizilishi
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                ctx.fillRect(s.x, s.y, s.size, s.size);
                s.y += s.speed;
                if (s.y > canvas.height) {
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
            }

            // O'yinchi kema
            player.draw();
            player.update();

            // Lazerlar harakati
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].draw();
                lasers[i].update();
                if (lasers[i].y < 0) {
                    lasers.splice(i, 1);
                }
            }

            // Dushmanlar harakati va to'qnashuvlar
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].draw();
                enemies[i].update();

                // Lazer dushmanga tekkanini aniqlash
                for (let j = lasers.length - 1; j >= 0; j--) {
                    let dist = Math.hypot(enemies[i].x - lasers[j].x, enemies[i].y - lasers[j].y);
                    if (dist < enemies[i].radius + 3) {
                        createExplosion(enemies[i].x, enemies[i].y, enemies[i].color);
                        score += 10;
                        scoreVal.innerText = score;
                        enemies.splice(i, 1);
                        lasers.splice(j, 1);
                        break;
                    }
                }
                
                if (!enemies[i]) continue;

                // O'yinchi kemaga to'qnashish
                let distToPlayer = Math.hypot(enemies[i].x - player.x, enemies[i].y - player.y);
                if (distToPlayer < enemies[i].radius + player.width/2) {
                    createExplosion(enemies[i].x, enemies[i].y, enemies[i].color);
                    player.health -= 25;
                    healthBar.style.width = player.health + '%';
                    playSound('hit');
                    enemies.splice(i, 1);
                    
                    if (player.health <= 0) {
                        gameOver();
                    }
                    continue;
                }

                // Ekrandan pastga tushib ketganlarni o'chirish
                if (enemies[i].y > canvas.height + 40) {
                    enemies.splice(i, 1);
                }
            }

            // Portlash zarrachalari
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].draw();
                particles[i].update();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(updateGame);
        }

        window.addEventListener('load', () => {
            initStars();
            // Boshlang'ich leaderboard ko'rsatish
            submitAndShowLeaderboard('space', 0);
        });
    </script>
</body>
</html>
