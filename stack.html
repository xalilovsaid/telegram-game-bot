<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tower Stack 🧱</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #03030b;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 800px;
            background: #090919;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        canvas {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
            pointer-events: none;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 5px #00ffcc;
        }
        #score-display {
            color: #00ffcc;
        }
        #hi-display {
            color: #ff00ff;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 11, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ffcc, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }
        .btn-restart {
            background: linear-gradient(90deg, #00ffcc, #0099ff);
            color: #03030b;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            text-transform: uppercase;
        }
        .btn-restart:active {
            transform: scale(0.95);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div>🏆 HI: <span id="hi-display">0</span></div>
            <div>🧱 BLOKLAR: <span id="score-display">0</span></div>
        </div>

        <div id="game-over-screen">
            <h1>MINORANGIZ QULADI 🧱💥</h1>
            <p id="go-score-text" style="color: #00f0ff; font-size: 18px; margin-bottom: 5px;"></p>
            <div id="mini-leaderboard" style="width:90%;max-width:300px;margin:10px auto;"></div>
            <button class="btn-restart" onclick="resetGame()">Qayta Boshlash 🔄</button>
        </div>

        <canvas id="gameCanvas" onclick="placeBlock()"></canvas>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); }
        const tgUser = tg?.initDataUnsafe?.user || { id: 0, first_name: "O'yinchi" };

        async function submitAndShowLeaderboard(gameName, finalScore) {
            // Submit score
            try {
                await fetch('/api/submit_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: tgUser.id,
                        name: tgUser.first_name,
                        game: gameName,
                        score: finalScore
                    })
                });
            } catch(e) { console.error('Submit error:', e); }

            // Fetch leaderboard
            try {
                const resp = await fetch(`/api/leaderboard?game=${gameName}`);
                const players = await resp.json();
                renderMiniLeaderboard(players);
            } catch(e) { console.error('Leaderboard error:', e); }
        }

        function renderMiniLeaderboard(players) {
            const container = document.getElementById('mini-leaderboard');
            if (!container) return;
            const top10 = players.filter(p => p.score > 0).slice(0, 10);
            if (top10.length === 0) {
                container.innerHTML = '<p style="color:#8c8caf;font-size:13px;">Hali hech kim o\'ynamagan</p>';
                return;
            }
            let html = '<div style="font-family:Orbitron,sans-serif;font-size:11px;color:#00f0ff;margin-bottom:6px;text-transform:uppercase;">🏆 TOP O\'YINCHILAR</div>';
            html += '<div style="max-height:180px;overflow-y:auto;width:100%;">';
            top10.forEach((p, i) => {
                const medals = ['🥇','🥈','🥉'];
                const medal = i < 3 ? medals[i] : `#${i+1}`;
                const isMe = String(p.id) === String(tgUser.id);
                const bg = isMe ? 'rgba(255,215,0,0.15)' : 'rgba(255,255,255,0.05)';
                const border = isMe ? '1px solid #ffd700' : '1px solid rgba(255,255,255,0.08)';
                html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 10px;margin:3px 0;border-radius:6px;background:${bg};border:${border};">`;
                html += `<span style="color:#ff007f;font-weight:bold;min-width:28px;font-size:13px;">${medal}</span>`;
                html += `<span style="flex:1;color:#fff;font-size:13px;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name || 'O\'yinchi'}</span>`;
                html += `<span style="color:#00f0ff;font-weight:bold;font-size:13px;">${p.score.toLocaleString()}</span>`;
                html += '</div>';
            });
            html += '</div>';
            container.innerHTML = html;
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('game-over-screen');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let gameActive = true;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('stack_hi') || '0');
        document.getElementById('hi-display').innerText = highScore;

        const blockHeight = 35;
        let currentWidth = 180;
        let currentX = 0;
        let currentSpeed = 3.5;
        let currentDir = 1;

        // Joylashtirilgan bloklar ro'yxati
        // {x, width, color}
        let stack = [];
        let debris = []; // falling cut-off pieces
        let audioCtx;

        const urlParams = new URLSearchParams(window.location.search);
        const mySkin = urlParams.get('skin') || 'standard';

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'hit') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'perfect') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.08); // G5
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // Klaviatura yordamida joylashtirish
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                placeBlock();
            }
        });

        // Boshlang'ich stack yaratish
        function initGame() {
            stack = [
                { x: (canvas.width - 180) / 2, width: 180, color: '#00ffcc' }
            ];
            debris = [];
            currentWidth = 180;
            currentX = 0;
            currentSpeed = 3.5;
            currentDir = 1;
            score = 0;
            gameActive = true;
            gameOverScreen.style.display = 'none';
            document.getElementById('score-display').innerText = score;
        }

        function placeBlock() {
            if (!gameActive) return;

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const baseBlock = stack[stack.length - 1];
            
            // Chegaralarni tekshirish (Overlap)
            const leftDiff = currentX - baseBlock.x;
            
            if (Math.abs(leftDiff) < 6) {
                // Perfect placement!
                currentX = baseBlock.x;
                playSound('perfect');
            } else {
                playSound('hit');
            }

            let newWidth = currentWidth - Math.abs(leftDiff);

            if (newWidth <= 0) {
                // Game over!
                gameActive = false;
                playSound('gameover');
                gameOverScreen.style.display = 'flex';
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('stack_hi', highScore);
                    document.getElementById('hi-display').innerText = highScore;
                }
                document.getElementById('go-score-text').innerText = `Natija: ${score} blok`;
                submitAndShowLeaderboard('stack', score);
                return;
            }

            // Debris (kesilgan bo'lak) yaratish
            if (leftDiff > 0) {
                debris.push({
                    x: baseBlock.x + newWidth,
                    width: leftDiff,
                    y: canvas.height - (stack.length * blockHeight) - 80,
                    vy: 0,
                    color: getColorForLevel(stack.length)
                });
            } else {
                debris.push({
                    x: currentX,
                    width: -leftDiff,
                    y: canvas.height - (stack.length * blockHeight) - 80,
                    vy: 0,
                    color: getColorForLevel(stack.length)
                });
            }

            // Yangi blokni stackka qo'shish
            const newX = leftDiff > 0 ? baseBlock.x : currentX;
            stack.push({
                x: newX,
                width: newWidth,
                color: getColorForLevel(stack.length)
            });

            currentWidth = newWidth;
            score = stack.length - 1;
            document.getElementById('score-display').innerText = score;

            // Tezlik va yo'nalish
            currentSpeed = 3.5 + Math.floor(score / 5) * 0.4;
            currentX = Math.random() > 0.5 ? -currentWidth : canvas.width;
            currentDir = currentX < 0 ? 1 : -1;
        }

        function getColorForLevel(level) {
            if (mySkin === 'cosmic') {
                const colors = [
                    '#ff00ff', '#8a2be2', '#4b0082', '#9370db', '#1e90ff',
                    '#00bfff', '#ba55d3', '#da70d6', '#ff1493'
                ];
                return colors[level % colors.length];
            }
            const colors = [
                '#00ffcc', '#00ff66', '#ffd700', '#ff9900', '#ff3366',
                '#ff00ff', '#9933ff', '#3333ff', '#00ffff'
            ];
            return colors[level % colors.length];
        }

        function update() {
            if (!gameActive) return;

            // Blokning harakati
            currentX += currentSpeed * currentDir;
            if (currentX + currentWidth > canvas.width) {
                currentDir = -1;
            } else if (currentX < 0) {
                currentDir = 1;
            }

            // Debris (kesik bo'lak) tushishi
            for (let i = debris.length - 1; i >= 0; i--) {
                let d = debris[i];
                d.vy += 0.5; // gravitatsiya
                d.y += d.vy;
                if (d.y > canvas.height) {
                    debris.splice(i, 1);
                }
            }
        }

        function draw() {
            if (mySkin === 'cosmic') {
                let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                skyGrad.addColorStop(0, '#0c051a');
                skyGrad.addColorStop(1, '#020005');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                for (let i = 0; i < 25; i++) {
                    ctx.fillRect((i * 97) % canvas.width, (i * 123) % canvas.height, 2, 2);
                }
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            const groundY = canvas.height - 80;

            // Kamera siljishi (minoraning balandligiga qarab)
            ctx.save();
            let cameraOffset = 0;
            if (stack.length > 5) {
                cameraOffset = (stack.length - 5) * blockHeight;
                ctx.translate(0, cameraOffset);
            }

            // Zaminni chizish
            ctx.fillStyle = '#060613';
            ctx.fillRect(0, groundY, canvas.width, 80);
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();

            // Joylashgan bloklarni chizish
            for (let i = 0; i < stack.length; i++) {
                const b = stack[i];
                const blockY = groundY - (i + 1) * blockHeight;
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = b.color;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, blockY, b.width, blockHeight - 2);
                ctx.restore();
            }

            // Debris (kesilgan parchalarni chizish)
            for (let d of debris) {
                ctx.save();
                ctx.fillStyle = d.color;
                ctx.fillRect(d.x, d.y - cameraOffset, d.width, blockHeight - 2);
                ctx.restore();
            }

            // Harakatlanayotgan yangi blokni chizish
            if (gameActive) {
                const activeY = groundY - (stack.length + 1) * blockHeight;
                ctx.save();
                const nextColor = getColorForLevel(stack.length);
                ctx.shadowBlur = 12;
                ctx.shadowColor = nextColor;
                ctx.fillStyle = nextColor;
                ctx.fillRect(currentX, activeY, currentWidth, blockHeight - 2);
                ctx.restore();
            }

            ctx.restore();
        }

        function resetGame() {
            initGame();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        initGame();
        loop();
    </script>
</body>
</html>
